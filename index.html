<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Robert</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin: 5px 0;
            opacity: 0.8;
        }

        .badge {
            margin-top: 15px;
            display: inline-block;
            padding: 5px 10px;
            background: #00adb5;
            border-radius: 20px;
            font-size: 12px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Halo! nama saya </h1>
        <h2>Robert Stuart Eklessia</h2>
        <p>Kelas: XI RPL</p>
        <p>Hobi: Main Game</p>
        <p>Email: zimbabuwe@gmail.com</p>

        <div class="badge">Future Developer.... barangkali</div>

        <div class="footer">
            Dibuat dengan Docker + Nginx
        </div>
    </div>
</body>
</html>
